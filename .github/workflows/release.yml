name: Build & Release

on:
  push:
    branches:
      - master
      - claude/plasma-mobile-magisk-module-tKtUL
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build launcher APK from source
        run: |
          set -euo pipefail

          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"

          # Find newest build-tools that has aapt + d8
          BUILD_TOOLS=""
          for bt in $(ls -d "$ANDROID_HOME/build-tools/"*/ 2>/dev/null | sort -V -r); do
            if [ -f "${bt}aapt" ] && [ -f "${bt}d8" ]; then
              BUILD_TOOLS="$bt"
              break
            fi
          done
          [ -n "$BUILD_TOOLS" ] || { echo "ERROR: build-tools with aapt+d8 not found"; exit 1; }
          echo "build-tools: $BUILD_TOOLS"

          # Find newest android.jar
          ANDROID_JAR=""
          for p in $(ls -d "$ANDROID_HOME/platforms/android-"*/ 2>/dev/null | sort -V -r); do
            if [ -f "${p}android.jar" ]; then
              ANDROID_JAR="${p}android.jar"
              break
            fi
          done
          [ -n "$ANDROID_JAR" ] || { echo "ERROR: android.jar not found"; exit 1; }
          echo "android.jar: $ANDROID_JAR"

          AAPT="${BUILD_TOOLS}aapt"
          D8="${BUILD_TOOLS}d8"
          ZIPALIGN="${BUILD_TOOLS}zipalign"
          APKSIGNER="${BUILD_TOOLS}apksigner"

          # Decode persistent signing key
          base64 -d signing/plasma.p12.b64 > /tmp/plasma.p12

          # Stage assets: aapt -A expects assets/ dir whose tree maps directly into APK assets/
          mkdir -p /tmp/assets/plasma
          cp launcher/index.html /tmp/assets/plasma/index.html

          # 1. Compile Java source (Java 8 bytecode for d8 desugaring)
          mkdir -p /tmp/classes
          javac -source 8 -target 8 \
            -classpath "$ANDROID_JAR" \
            -d /tmp/classes \
            launcher/java/msr/plasma/LauncherActivity.java

          # 2. Dex (d8 desugars to minSdk 21)
          mkdir -p /tmp/dex
          find /tmp/classes -name '*.class' | xargs \
            "$D8" --lib "$ANDROID_JAR" --min-api 21 --output /tmp/dex

          # 3. Package manifest + resources + assets into APK skeleton via aapt
          "$AAPT" package \
            -M launcher/AndroidManifest.xml \
            -S launcher/res \
            -A /tmp/assets \
            -I "$ANDROID_JAR" \
            -F /tmp/plasma-res.apk

          # 4. Add classes.dex to the APK
          (cd /tmp/dex && zip -j /tmp/plasma-res.apk classes.dex)

          # 5. Align and sign (v1 + v2)
          "$ZIPALIGN" -f 4 /tmp/plasma-res.apk /tmp/plasma-aligned.apk
          "$APKSIGNER" sign \
            --ks /tmp/plasma.p12 --ks-pass pass:plasma123 \
            --min-sdk-version 21 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out system/priv-app/PlasmaLauncher/PlasmaLauncher.apk \
            /tmp/plasma-aligned.apk

          echo "APK built from source: $(ls -lh system/priv-app/PlasmaLauncher/PlasmaLauncher.apk)"

      - name: Build module zip
        run: bash build.sh

      - name: Read version
        id: ver
        run: echo "VERSION=$(grep '^version=' module.prop | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: Plasma Mobile Theme ${{ steps.ver.outputs.VERSION }}
          body: |
            ## Plasma Mobile Theme ${{ steps.ver.outputs.VERSION }}

            Flash via **Magisk Manager**. Requires Magisk v20.4+.

            ### What's included
            - **Plasma Mobile launcher** — home screen + swipe-up app drawer, KDE Gear logo, Breeze Dark glassmorphism, clock, date, pinned apps
            - **Noto Sans** font — downloads at flash time, retries on first boot
            - **KDE wallpapers** — MilkyWay, Volna, Next, EveningGlow — retry on first boot if missed
            - **KDE Android apps** — KDE Connect, Kasts, Markor — auto-installed on first boot via F-Droid API
            - **Breeze Dark** system theme: dark mode, Breeze Blue accent (#3DAEE9), squircle icons, gesture nav, 0.8x animations

            ### After flashing
            1. Reboot
            2. If prompted, pick **Plasma Mobile** as your home app
            3. If launcher didn't switch: **Settings -> Apps -> Default apps -> Home app -> Plasma Mobile**
            4. KDE apps install ~1 min after boot — check `/data/local/tmp/plasma-theme.log`
          files: plasma-mobile-${{ steps.ver.outputs.VERSION }}.zip
          make_latest: true
