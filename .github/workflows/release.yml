name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: bash build.sh

      - name: Read version
        id: ver
        run: echo "VERSION=$(grep '^version=' module.prop | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: Plasma Mobile Theme ${{ steps.ver.outputs.VERSION }}
          body: |
            Flash via Magisk Manager. Requires Magisk v20.4+.
            Applies Breeze dark theme, Noto Sans font, and Plasma Mobile launcher.
          files: plasma-mobile-${{ steps.ver.outputs.VERSION }}.zip
          make_latest: true
